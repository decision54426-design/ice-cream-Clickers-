<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>スーパー・アイスクリッカー</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            text-align: center;
            background-color: #f0f8ff;
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
            position: relative;
            min-height: 100vh;
        }
        #ice-cream {
            font-size: 120px;
            cursor: pointer;
            user-select: none;
            transition: transform 0.05s;
            display: inline-block;
            margin: 20px;
        }
        #ice-cream:active {
            transform: scale(0.9);
        }
        /* ポップアップテキストのアニメーション */
        .click-pop {
            position: absolute;
            font-weight: bold;
            font-size: 24px;
            color: #ff4500;
            pointer-events: none;
            animation: floatUp 0.8s ease-out forwards;
        }
        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-100px) scale(1.2); }
        }
        /* ゴールデンアイスのスタイル */
        .golden-ice {
            position: absolute;
            font-size: 50px;
            cursor: pointer;
            z-index: 100;
            animation: spin 2s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(180deg) scale(1.3); }
            100% { transform: rotate(360deg) scale(1); }
        }
        .container {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }
        .panel {
            background: white;
            border: 1px solid #ccc;
            padding: 15px;
            width: 320px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .shop-item, .achievement-item {
            border-bottom: 1px dashed #eee;
            padding: 10px 0;
        }
        .achievement-item.unlocked {
            background-color: #e0f7fa;
            color: #006064;
        }
        button {
            padding: 6px 12px;
            background-color: #ff69b4;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }
        .system-btn {
            background-color: #708090;
            margin: 5px;
        }
    </style>
</head>
<body>

    <h1>🍦 スーパー・アイスクリッカー 🍦</h1>
    <h2>所持コイン: <span id="coin-count">0</span></h2>
    <p>毎秒自動で増える量 (CPS): <span id="cps-count">0</span> | 現在のクリック力: <span id="power-count">1</span></p>

    <!-- メインのアイス -->
    <div id="ice-cream">🍦</div>

    <div>
        <button class="system-btn" onclick="saveGame()">手動セーブ</button>
        <button class="system-btn" style="background-color: #cd5c5c;" onclick="resetGame()">データ初期化</button>
    </div>

    <div class="container">
        <!-- ショップパネル -->
        <div class="panel">
            <h3>🛒 ショップ</h3>
            <div class="shop-item">
                <p>🍫 チョコトッピング (クリック力 +1)</p>
                <p>価格: <span id="item1-cost">15</span> コイン</p>
                <button id="buy-item1" onclick="buyItem1()">購入</button>
            </div>
            <div class="shop-item">
                <p>🤖 自動アイス製造機 (CPS +1)</p>
                <p>価格: <span id="item2-cost">100</span> コイン</p>
                <button id="buy-item2" onclick="buyItem2()">購入</button>
            </div>
        </div>

        <!-- 実績パネル -->
        <div class="panel">
            <h3>🏆 実績 (解除でクリック力2倍)</h3>
            <div id="ach1" class="achievement-item">
                <p>【ビギナー】100コイン到達</p>
            </div>
            <div id="ach2" class="achievement-item">
                <p>【アイス職人】自動化機を5台保有</p>
            </div>
        </div>
    </div>

    <script>
        // --- ゲームデータ ---
        let gameData = {
            coins: 0,
            baseClickPower: 1,
            cps: 0,
            item1Cost: 15,
            item2Cost: 100,
            item2Count: 0,
            ach1Unlocked: false,
            ach2Unlocked: false
        };

        // 実績による倍率計算
        function getClickPower() {
            let multiplier = 1;
            if (gameData.ach1Unlocked) multiplier *= 2;
            if (gameData.ach2Unlocked) multiplier *= 2;
            return gameData.baseClickPower * multiplier;
        }

        // --- 画面表示の更新 ---
        function updateDisplay() {
            document.getElementById('coin-count').innerText = Math.floor(gameData.coins);
            document.getElementById('cps-count').innerText = gameData.cps;
            document.getElementById('power-count').innerText = getClickPower();
            document.getElementById('item1-cost').innerText = gameData.item1Cost;
            document.getElementById('item2-cost').innerText = gameData.item2Cost;

            // ボタンの有効化制御
            document.getElementById('buy-item1').disabled = gameData.coins < gameData.item1Cost;
            document.getElementById('buy-item2').disabled = gameData.coins < gameData.item2Cost;

            // 実績の見た目更新
            if (gameData.ach1Unlocked) document.getElementById('ach1').classList.add('unlocked');
            if (gameData.ach2Unlocked) document.getElementById('ach2').classList.add('unlocked');
        }

        // --- エフェクト演出 ---
        function createPopEffect(x, y, text) {
            const pop = document.createElement('div');
            pop.className = 'click-pop';
            pop.innerText = text;
            pop.style.left = `${x}px`;
            pop.style.top = `${y}px`;
            document.body.appendChild(pop);
            
            setTimeout(() => pop.remove(), 800);
        }

        // --- メインのアイスクリック ---
        document.getElementById('ice-cream').addEventListener('click', (e) => {
            const power = getClickPower();
            gameData.coins += power;
            createPopEffect(e.pageX, e.pageY, `+${power}`);
            checkAchievements();
            updateDisplay();
        });

        // --- アイテム購入 ---
        function buyItem1() {
            if (gameData.coins >= gameData.item1Cost) {
                gameData.coins -= gameData.item1Cost;
                gameData.baseClickPower += 1;
                gameData.item1Cost = Math.ceil(gameData.item1Cost * 1.15);
                updateDisplay();
            }
        }

        function buyItem2() {
            if (gameData.coins >= gameData.item2Cost) {
                gameData.coins -= gameData.item2Cost;
                gameData.cps += 1;
                gameData.item2Count += 1;
                gameData.item2Cost = Math.ceil(gameData.item2Cost * 1.15);
                checkAchievements();
                updateDisplay();
            }
        }

        // --- 実績チェック ---
        function checkAchievements() {
            if (!gameData.ach1Unlocked && gameData.coins >= 100) {
                gameData.ach1Unlocked = true;
                alert('🏆 実績解除: 100コイン到達！クリック力が2倍になった！');
            }
            if (!gameData.ach2Unlocked && gameData.item2Count >= 5) {
                gameData.ach2Unlocked = true;
                alert('🏆 実績解除: アイス職人！クリック力がさらに2倍になった！');
            }
        }

        // --- ゴールデンアイス（ランダムイベント） ---
        function spawnGoldenIce() {
            const golden = document.createElement('div');
            golden.className = 'golden-ice';
            golden.innerText = '🌟🍦🌟';
            
            // 画面内のランダムな位置に配置
            golden.style.left = Math.random() * (window.innerWidth - 100) + 'px';
            golden.style.top = Math.random() * (window.innerHeight - 100) + 'px';
            
            golden.addEventListener('click', (e) => {
                // 所持金の10%（最低でも50コイン）をボーナス
                const bonus = Math.max(50, Math.floor(gameData.coins * 0.1));
                gameData.coins += bonus;
                createPopEffect(e.pageX, e.pageY, `✨ボーナス +${bonus}✨`);
                golden.remove();
                updateDisplay();
            });

            document.body.appendChild(golden);
            // 8秒クリックされなかったら消滅
            setTimeout(() => { golden.remove(); }, 8000);
        }
        // 15秒〜30秒のランダムな間隔でゴールデンアイスを出現させる
        setInterval(() => {
            if (Math.random() > 0.5) spawnGoldenIce();
        }, 15000);

        // --- 自動化（CPS）と自動セーブ ---
        setInterval(() => {
            if (gameData.cps > 0) {
                gameData.coins += gameData.cps;
                checkAchievements();
                updateDisplay();
            }
        }, 1000);

        // 30秒ごとにオートセーブ
        setInterval(saveGame, 30000);

        // --- セーブ＆ロードシステム ---
        function saveGame() {
            localStorage.setItem('iceClickerSave', JSON.stringify(gameData));
        }

        function loadGame() {
            const savedData = localStorage.getItem('iceClickerSave');
            if (savedData) {
                gameData = JSON.parse(savedData);
                updateDisplay();
            }
        }

        function resetGame() {
            if (confirm('本当にゲームデータをリセットしますか？')) {
                localStorage.removeItem('iceClickerSave');
                location.reload();
            }
        }

        // ページを開いたときにセーブデータを読み込む
        loadGame();
    </script>
</body>
</html>
